name: CI build

on:
  push:
    branches: [ "main" ]
    tags: [ "*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Tipo de build (Release/Debug)'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug
      pvz_debug:
        description: 'PVZ_DEBUG (ON/OFF)'
        required: true
        default: 'OFF'
        type: choice
        options:
          - ON
          - OFF

# Variables globales - Cambia aquí para controlar todos los builds
env:
  BUILD_TYPE: ${{ github.event.inputs.build_type || 'Release' }}  # Release (optimizado) o Debug (con símbolos)
  PVZ_DEBUG: ${{ github.event.inputs.pvz_debug || 'OFF' }}        # ON para logs en runtime, OFF para silencio

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  auto-tag:
    name: Generate Auto Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - id: tag
        name: Determine next tag
        run: |
          LAST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)

          if [ -z "$LAST_TAG" ]; then
            NEXT_TAG="v1.0.0"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<<"${LAST_TAG#v}"
            PATCH=$((PATCH + 1))
            NEXT_TAG="v$MAJOR.$MINOR.$PATCH"
          fi

          echo "tag=$NEXT_TAG" >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          git tag ${{ steps.tag.outputs.tag }}
          git push origin ${{ steps.tag.outputs.tag }}

  build-archlinux:
    name: Build for Arch Linux (x86_64)
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    # Cache para Arch Linux
    - name: Cache build files
      uses: actions/cache@v4
      with:
        path: |
          build
          ~/.cache/pacman
        key: archlinux-${{ env.BUILD_TYPE }}-${{ env.PVZ_DEBUG }}-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake') }}
        restore-keys: |
          archlinux-${{ env.BUILD_TYPE }}-${{ env.PVZ_DEBUG }}-
          archlinux-

    - name: Install Base Dependencies
      run: |
        pacman -Syu --noconfirm
        pacman -S --noconfirm \
          base-devel \
          cmake \
          libjpeg-turbo \
          libogg \
          libopenmpt \
          libpng \
          libvorbis \
          mpg123 \
          ninja \
          sdl2-compat \
          sudo

    - name: Create Builder User
      run: |
        useradd -m builder
        echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder
        chmod 0440 /etc/sudoers.d/builder

    - name: Fix Directory Permissions
      run: |
        chown -R builder:builder .

    - name: Build PvZ-Portable
      run: |
        sudo -u builder bash -lc '
          mkdir -p build
          cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DPVZ_DEBUG=${{ env.PVZ_DEBUG }}
          cmake --build build

          mkdir -p dist
          cp build/pvz-portable dist/
          
          # Solo strip en Release (en Debug queremos mantener símbolos)
          if [ "${{ env.BUILD_TYPE }}" = "Release" ]; then
            strip dist/pvz-portable
          fi
        '

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: pvz-portable-archlinux-${{ env.BUILD_TYPE }}
        path: dist/

  build-windows-msys2-ucrt64:
    name: Build for Windows (MSYS2 UCRT64)
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    # Cache para MSYS2
    - name: Cache MSYS2 packages
      uses: actions/cache@v4
      with:
        path: |
          C:\tools\msys64\var\cache\pacman\pkg
          build
        key: msys2-${{ env.BUILD_TYPE }}-${{ env.PVZ_DEBUG }}-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake') }}
        restore-keys: |
          msys2-${{ env.BUILD_TYPE }}-${{ env.PVZ_DEBUG }}-
          msys2-

    - uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: >-
          base-devel
          mingw-w64-ucrt-x86_64-cmake
          mingw-w64-ucrt-x86_64-gcc
          mingw-w64-ucrt-x86_64-libjpeg-turbo
          mingw-w64-ucrt-x86_64-libopenmpt
          mingw-w64-ucrt-x86_64-libogg
          mingw-w64-ucrt-x86_64-libpng
          mingw-w64-ucrt-x86_64-libvorbis
          mingw-w64-ucrt-x86_64-mpg123
          mingw-w64-ucrt-x86_64-ninja
          mingw-w64-ucrt-x86_64-SDL2

    - name: Compile PvZ-Portable for Windows
      shell: msys2 {0}
      run: |
        mkdir -p build
        cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DCONSOLE=OFF -DBUILD_STATIC=ON -DCMAKE_COLOR_DIAGNOSTICS=ON -DPVZ_DEBUG=${{ env.PVZ_DEBUG }}
        cmake --build build
        
        mkdir -p dist
        cp build/pvz-portable.exe dist/
        
        # Solo strip en Release
        if [ "${{ env.BUILD_TYPE }}" = "Release" ]; then
          strip dist/pvz-portable.exe
        fi

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: pvz-portable-windows-msys2-ucrt64-${{ env.BUILD_TYPE }}
        path: dist/

  build-windows-msvc-x64:
    name: Build for Windows (MSVC x64)
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    # Cache para MSVC
    - name: Cache build files
      uses: actions/cache@v4
      with:
        path: |
          build
          ~\.cache\vcpkg
        key: msvc-${{ env.BUILD_TYPE }}-${{ env.PVZ_DEBUG }}-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake', 'vcpkg.json') }}
        restore-keys: |
          msvc-${{ env.BUILD_TYPE }}-${{ env.PVZ_DEBUG }}-
          msvc-

    - uses: ilammy/msvc-dev-cmd@v1

    - name: Install Ninja
      run: choco install ninja -y

    - name: Setup vcpkg (manifest mode)
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgJsonGlob: vcpkg.json

    - name: Compile PvZ-Portable for Windows (MSVC)
      shell: pwsh
      run: |
        cmake -G "Ninja" -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DCONSOLE=OFF -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x64-windows-static -DPVZ_DEBUG=${{ env.PVZ_DEBUG }}
        cmake --build build

        New-Item -ItemType Directory -Force -Path dist | Out-Null
        Copy-Item build/pvz-portable.exe dist/

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: pvz-portable-windows-msvc-x64-${{ env.BUILD_TYPE }}
        path: dist/

  build-switch:
    name: Build for Switch
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64:latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    # Cache para Switch
    - name: Cache build files
      uses: actions/cache@v4
      with:
        path: |
          build
          openmpt
        key: switch-${{ env.BUILD_TYPE }}-${{ env.PVZ_DEBUG }}-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake') }}
        restore-keys: |
          switch-${{ env.BUILD_TYPE }}-${{ env.PVZ_DEBUG }}-
          switch-

    - name: Compile libopenmpt for Switch
      shell: bash
      run: |
        source $DEVKITPRO/switchvars.sh
        if [ ! -d "openmpt" ]; then
          git clone https://github.com/OpenMPT/openmpt
          cd openmpt
          make CONFIG=gcc SHARED_LIB=0 DYNLINK=0 EXAMPLES=0 OPENMPT123=0 TEST=0 PREFIX=$PORTLIBS_PREFIX install
        else
          echo "libopenmpt ya existe, saltando compilación"
        fi

    - name: Compile PvZ-Portable for Switch
      shell: bash
      run: |
        source $DEVKITPRO/switchvars.sh
        mkdir -p build
        cd build
        aarch64-none-elf-cmake .. -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DPVZ_DEBUG=${{ env.PVZ_DEBUG }}
        make
        # Solo strip en Release
        if [ "${{ env.BUILD_TYPE }}" = "Release" ]; then
          aarch64-none-elf-strip pvz-portable.elf
        fi

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: pvz-portable-switch-${{ env.BUILD_TYPE }}
        path: |
          ./build/pvz-portable.nro
          ./build/pvz-portable.elf

  build-macos:
    name: Build for macOS (aarch64)
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    # Cache para macOS
    - name: Cache build files
      uses: actions/cache@v4
      with:
        path: |
          build
          ~/Library/Caches/Homebrew
        key: macos-${{ env.BUILD_TYPE }}-${{ env.PVZ_DEBUG }}-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake') }}
        restore-keys: |
          macos-${{ env.BUILD_TYPE }}-${{ env.PVZ_DEBUG }}-
          macos-

    - name: Install Dependencies
      run: |
        brew update
        brew install cmake \
          dylibbundler \
          jpeg-turbo \
          libogg \
          libopenmpt \
          libpng \
          libvorbis \
          mpg123 \
          ninja \
          sdl2

    - name: Build PvZ-Portable
      run: |
        mkdir -p build
        cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DPVZ_DEBUG=${{ env.PVZ_DEBUG }}
        cmake --build build

        mkdir -p dist
        mkdir -p dist/libs
        cp build/pvz-portable dist/
        
        # Solo strip en Release
        if [ "${{ env.BUILD_TYPE }}" = "Release" ]; then
          strip -x dist/pvz-portable
        fi

        echo "Bundling dependencies..."
        dylibbundler -of -b -x dist/pvz-portable -d dist/libs -p @executable_path/libs/

        codesign --force --deep -s - dist/pvz-portable

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: pvz-portable-macos-${{ env.BUILD_TYPE }}
        path: dist/

  build-android:
    name: Build for Android (arm64-v8a)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    # Cache para Android
    - name: Cache build files
      uses: actions/cache@v4
      with:
        path: |
          build-android-*
          sdl2-src
          sdl2-android
          ~/.gradle/caches
        key: android-${{ env.BUILD_TYPE }}-${{ env.PVZ_DEBUG }}-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake', 'vcpkg.json', 'android/**') }}
        restore-keys: |
          android-${{ env.BUILD_TYPE }}-${{ env.PVZ_DEBUG }}-
          android-

    - name: Set up JDK
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android NDK
      run: |
        # Use the latest NDK available on the runner
        if [ -n "$ANDROID_NDK_LATEST_HOME" ] && [ -d "$ANDROID_NDK_LATEST_HOME" ]; then
          echo "ANDROID_NDK=$ANDROID_NDK_LATEST_HOME" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> "$GITHUB_ENV"
          echo "Using pre-installed NDK: $ANDROID_NDK_LATEST_HOME"
        else
          # Fallback: install via sdkmanager
          yes | sdkmanager --install "ndk;$(sdkmanager --list 2>/dev/null | grep -oP 'ndk;\K[\d.]+' | sort -V | tail -1)" || true
          NDK_DIR=$(ls -d "$ANDROID_HOME"/ndk/*/ 2>/dev/null | sort -V | tail -1)
          echo "ANDROID_NDK=${NDK_DIR%/}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=${NDK_DIR%/}" >> "$GITHUB_ENV"
        fi

    - name: Download SDL2 Source
      run: |
        if [ ! -d "sdl2-src" ]; then
          SDL2_TAG=$(git ls-remote --tags https://github.com/libsdl-org/SDL.git 'refs/tags/release-2.*' \
            | sed 's|.*refs/tags/release-||' | sort -V | tail -1)
          if [ -z "$SDL2_TAG" ]; then
            SDL2_TAG="2.32.10" # Fallback to a known stable version if tag retrieval fails
          fi
          echo "Using SDL2 version: $SDL2_TAG"
          wget -q "https://github.com/libsdl-org/SDL/releases/download/release-${SDL2_TAG}/SDL2-${SDL2_TAG}.tar.gz"
          tar xf "SDL2-${SDL2_TAG}.tar.gz"
          mv "SDL2-${SDL2_TAG}" sdl2-src
        else
          echo "SDL2 source ya existe, saltando descarga"
        fi

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgJsonGlob: vcpkg.json

    - name: Build SDL2 Shared Library
      run: |
        if [ ! -d "sdl2-android" ]; then
          # On Android, SDL2 MUST be a shared library because the Java-side
          # SDLActivity loads it via System.loadLibrary("SDL2").
          cmake -B build-sdl2 \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-28 \
            -DSDL_SHARED=ON \
            -DSDL_STATIC=OFF \
            -DCMAKE_INSTALL_PREFIX=$GITHUB_WORKSPACE/sdl2-android \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            sdl2-src
          cmake --build build-sdl2 -j$(nproc)
          cmake --install build-sdl2
        else
          echo "SDL2 ya compilada, saltando"
        fi

    - name: Build Native Library with CMake
      run: |
        ABI=arm64-v8a
        ANDROID_API=28
        BUILD_DIR=build-android-$ABI
        SDL2_PREFIX=$GITHUB_WORKSPACE/sdl2-android

        cmake -B $BUILD_DIR \
          -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake \
          -DVCPKG_TARGET_TRIPLET=arm64-android \
          -DVCPKG_CMAKE_SYSTEM_VERSION=$ANDROID_API \
          -DVCPKG_CHAINLOAD_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=$ABI \
          -DANDROID_PLATFORM=android-$ANDROID_API \
          -DSDL2_DIR=$SDL2_PREFIX/lib/cmake/SDL2 \
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
          -DPVZ_DEBUG=${{ env.PVZ_DEBUG }}

        cmake --build $BUILD_DIR -j$(nproc)

        # Collect all shared libraries into jniLibs for Gradle to package
        JNILIBS=android/app/src/main/jniLibs/$ABI
        mkdir -p $JNILIBS
        cp -L $BUILD_DIR/libmain.so $JNILIBS/

        # Copy SDL2 shared library
        cp -L $SDL2_PREFIX/lib/libSDL2*.so $JNILIBS/

        # Copy any .so dependencies from vcpkg (manifest mode installs into build dir)
        VCPKG_LIB=$BUILD_DIR/vcpkg_installed/arm64-android/lib
        for so in "$VCPKG_LIB"/*.so; do
          [ -f "$so" ] && cp -L "$so" $JNILIBS/
        done

        # Strip debug symbols solo en Release
        if [ "${{ env.BUILD_TYPE }}" = "Release" ]; then
          STRIP=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip
          for so in "$JNILIBS"/*.so; do
            "$STRIP" --strip-unneeded "$so"
          done
        fi

        echo "Collected .so files:"
        ls -lh $JNILIBS/

    - name: Build APK with Gradle
      run: |
        cd android
        echo "sdk.dir=$ANDROID_HOME" > local.properties

        # Use gradle wrapper; package pre-built native libraries into a release APK (debug-signed)
        gradle wrapper
        ./gradlew assemble${{ env.BUILD_TYPE }} -PusePrebuiltLibs=true --no-daemon

    - name: Copy APK
      run: |
        mkdir -p dist
        BUILD_TYPE_LOWER=$(echo ${{ env.BUILD_TYPE }} | tr '[:upper:]' '[:lower:]')
        find android -name "*.apk" -path "*/$BUILD_TYPE_LOWER/*" -exec cp {} dist/pvz-portable-android-arm64-v8a-${{ env.BUILD_TYPE }}.apk \;

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: pvz-portable-android-${{ env.BUILD_TYPE }}
        path: dist/

  build-ios:
    name: Build for iOS (arm64)
    runs-on: macos-latest
    env:
      IOS_DEPLOY_TARGET: "15.0"
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    # Cache para iOS
    - name: Cache build files
      uses: actions/cache@v4
      with:
        path: |
          build-ios
          ~/Library/Caches/Homebrew
        key: ios-${{ env.BUILD_TYPE }}-${{ env.PVZ_DEBUG }}-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake', 'vcpkg.json', 'ios/**') }}
        restore-keys: |
          ios-${{ env.BUILD_TYPE }}-${{ env.PVZ_DEBUG }}-
          ios-

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgJsonGlob: vcpkg.json

    - name: Build PvZ-Portable for iOS
      run: |
        BUILD_DIR=build-ios

        cmake -B $BUILD_DIR \
          -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake \
          -DVCPKG_TARGET_TRIPLET=arm64-ios \
          -DVCPKG_OVERLAY_PORTS=$GITHUB_WORKSPACE/ios/ports \
          -DCMAKE_SYSTEM_NAME=iOS \
          -DCMAKE_OSX_DEPLOYMENT_TARGET=$IOS_DEPLOY_TARGET \
          -DCMAKE_OSX_ARCHITECTURES=arm64 \
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
          -DPVZ_DEBUG=${{ env.PVZ_DEBUG }} \
          -G Xcode

        cmake --build $BUILD_DIR --config ${{ env.BUILD_TYPE }} -- \
          -sdk iphoneos \
          CODE_SIGN_IDENTITY="-" \
          CODE_SIGNING_ALLOWED=NO

    - name: Create unsigned IPA
      run: |
        APP_PATH=$(find build-ios -name "pvz-portable.app" -path "*${{ env.BUILD_TYPE }}*" | head -1)
        mkdir -p dist/Payload
        cp -R "$APP_PATH" dist/Payload/
        cd dist
        zip -r -y pvz-portable-ios-arm64-${{ env.BUILD_TYPE }}.ipa Payload/
        rm -rf Payload

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: pvz-portable-ios-${{ env.BUILD_TYPE }}
        path: dist/

  build-wasm:
    name: Build for WebAssembly (Emscripten)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    # Cache para WASM
    - name: Cache build files
      uses: actions/cache@v4
      with:
        path: |
          build-wasm
          /tmp/libopenmpt-src
          ~/.emscripten_cache
        key: wasm-${{ env.BUILD_TYPE }}-${{ env.PVZ_DEBUG }}-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake') }}
        restore-keys: |
          wasm-${{ env.BUILD_TYPE }}-${{ env.PVZ_DEBUG }}-
          wasm-

    - name: Setup Emscripten
      uses: mymindstorm/setup-emsdk@v14

    - name: Install Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build

    - name: Build libopenmpt for Emscripten
      run: |
        SYSROOT="$(em-config EMSCRIPTEN_ROOT)/cache/sysroot"
        if [ ! -d "/tmp/libopenmpt-src" ]; then
          OPENMPT_TAG=$(git ls-remote --tags https://github.com/OpenMPT/openmpt.git 'refs/tags/libopenmpt-*' \
            | grep -v '\^{}' | sed 's|.*refs/tags/libopenmpt-||' \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
          if [ -z "$OPENMPT_TAG" ]; then
            OPENMPT_TAG="0.8.4" # Fallback to a known stable version if tag retrieval fails
          fi
          echo "Using libopenmpt version: $OPENMPT_TAG"
          git clone --depth=1 --branch "libopenmpt-${OPENMPT_TAG}" https://github.com/OpenMPT/openmpt.git /tmp/libopenmpt-src
          cd /tmp/libopenmpt-src
          emmake make CONFIG=emscripten \
            STATIC_LIB=1 SHARED_LIB=0 \
            EXAMPLES=0 OPENMPT123=0 TEST=0 \
            NO_ZLIB=1 NO_MPG123=1 NO_OGG=1 NO_VORBIS=1 NO_VORBISFILE=1 \
            NO_PORTAUDIO=1 NO_PORTAUDIOCPP=1 NO_PULSEAUDIO=1 \
            NO_SDL2=1 NO_FLAC=1 NO_SNDFILE=1 \
            -j$(nproc)
          emmake make CONFIG=emscripten \
            STATIC_LIB=1 SHARED_LIB=0 \
            EXAMPLES=0 OPENMPT123=0 TEST=0 \
            PREFIX="${SYSROOT}" install
        else
          echo "libopenmpt ya compilado, saltando"
        fi

    - name: Build PvZ-Portable for WebAssembly
      run: |
        mkdir -p build-wasm
        emcmake cmake -G Ninja -B build-wasm -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DLIMBO_PAGE=OFF -DPVZ_DEBUG=${{ env.PVZ_DEBUG }}
        cmake --build build-wasm -j$(nproc)

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: pvz-portable-wasm-${{ env.BUILD_TYPE }}
        path: |
          build-wasm/pvz-portable.html
          build-wasm/pvz-portable.js
          build-wasm/pvz-portable.wasm

  release:
    name: Release
    needs: ['auto-tag', 'build-archlinux', 'build-windows-msys2-ucrt64', 'build-windows-msvc-x64', 'build-switch', 'build-macos', 'build-android', 'build-ios', 'build-wasm']
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # CORREGIDO: No se puede usar env en if, usamos github.event.inputs
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && github.event.inputs.build_type == 'Release' && github.event.inputs.pvz_debug == 'OFF'
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Release Files
        run: |
          mkdir -p release_files

          echo "Preparing Arch Linux file..."
          chmod +x artifacts/pvz-portable-archlinux-Release/pvz-portable
          mv artifacts/pvz-portable-archlinux-Release/pvz-portable release_files/pvz-portable-archlinux-x86_64

          echo "Preparing Windows MSVC file..."
          mv artifacts/pvz-portable-windows-msvc-x64-Release/pvz-portable.exe release_files/pvz-portable-windows-msvc-x64-static.exe

          echo "Preparing Windows MSYS2 file..."
          mv artifacts/pvz-portable-windows-msys2-ucrt64-Release/pvz-portable.exe release_files/pvz-portable-windows-ucrt64-static.exe

          echo "Preparing macOS file..."
          cd artifacts/pvz-portable-macos-Release
          chmod +x pvz-portable
          zip -r -y ../../release_files/pvz-portable-macos-aarch64.zip .
          cd ../..

          echo "Preparing Android file..."
          mv artifacts/pvz-portable-android-Release/pvz-portable-android-arm64-v8a-Release.apk release_files/pvz-portable-android-arm64-v8a.apk

          echo "Preparing iOS file..."
          mv artifacts/pvz-portable-ios-Release/pvz-portable-ios-arm64-Release.ipa release_files/pvz-portable-ios-arm64.ipa

          echo "Preparing WebAssembly file..."
          cd artifacts/pvz-portable-wasm-Release
          zip -r ../../release_files/pvz-portable-wasm.zip .
          cd ../..

          echo "Final files:"
          ls -lh release_files/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.auto-tag.outputs.tag }}
          files: release_files/*
          generate_release_notes: true
          draft: false
          prerelease: false