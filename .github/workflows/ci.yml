name: CI build

on:
  push:
    branches: [ "main" ]
    tags: [ "*" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  auto-tag:
    name: Auto Tag
    # Only run on direct pushes to main (not on PRs and not on tag pushes to avoid loops)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.create-tag.outputs.tag }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Create and push date-based tag
      id: create-tag
      run: |
        TAG="v$(date -u +'%Y.%m.%d-%H%M')"
        echo "Creating tag: $TAG"
        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag "$TAG"
        git push origin "$TAG"
        echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  build-switch:
    name: Build for Nintendo Switch
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64:latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Cache devkitPro portlibs to avoid rebuilding them every run
    - name: Cache devkitPro portlibs
      uses: actions/cache@v4
      with:
        path: /opt/devkitpro/portlibs
        key: devkitpro-portlibs-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt') }}
        restore-keys: |
          devkitpro-portlibs-${{ runner.os }}-

    # Cache the libopenmpt build to avoid recompiling it from source each time
    - name: Cache libopenmpt build
      id: cache-openmpt
      uses: actions/cache@v4
      with:
        path: /tmp/openmpt-install
        key: switch-libopenmpt-${{ runner.os }}-v1

    - name: Compile libopenmpt for Switch
      if: steps.cache-openmpt.outputs.cache-hit != 'true'
      shell: bash
      run: |
        source $DEVKITPRO/switchvars.sh
        git clone --depth=1 https://github.com/OpenMPT/openmpt /tmp/openmpt-src
        cd /tmp/openmpt-src
        make CONFIG=gcc SHARED_LIB=0 DYNLINK=0 EXAMPLES=0 OPENMPT123=0 TEST=0 \
          PREFIX=/tmp/openmpt-install install

    - name: Install libopenmpt into portlibs
      shell: bash
      run: |
        cp -r /tmp/openmpt-install/* $DEVKITPRO/portlibs/switch/ || true

    # Cache the CMake build directory so incremental builds are fast
    - name: Cache CMake build directory
      uses: actions/cache@v4
      with:
        path: build
        key: switch-cmake-build-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt', 'src/**/*.cpp', 'src/**/*.h') }}
        restore-keys: |
          switch-cmake-build-${{ runner.os }}-

    - name: Compile PvZ-Portable for Switch
      shell: bash
      run: |
        source $DEVKITPRO/switchvars.sh
        mkdir -p build
        cd build
        aarch64-none-elf-cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_FLAGS_RELEASE=-O2
        make -j$(nproc)

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pvz-portable-switch
        path: |
          build/pvz-portable.nro
          build/pvz-portable.elf

  release:
    name: Release
    needs: [ 'build-switch' ]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download All Artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Prepare Release Files
      run: |
        mkdir release_files

        echo "Preparing Nintendo Switch files..."
        mv artifacts/pvz-portable-switch/pvz-portable.nro release_files/pvz-portable-switch.nro
        mv artifacts/pvz-portable-switch/pvz-portable.elf release_files/pvz-portable-switch.elf

        echo "Final files:"
        ls -lh release_files/

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: release_files/*
        generate_release_notes: true
        draft: false
        prerelease: false
