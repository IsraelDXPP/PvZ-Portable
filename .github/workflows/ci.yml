name: CI build

on:
  push:
    branches: [ "main" ]
    tags: [ "*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'Release'
        type: choice
        options: [Release, Debug]
      pvz_debug:
        description: 'PVZ_DEBUG'
        required: true
        default: 'OFF'
        type: choice
        options: [ON, OFF]

env:
  BUILD_TYPE: ${{ github.event.inputs.build_type || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && 'Release' || 'Debug') }}
  PVZ_DEBUG: ${{ github.event.inputs.pvz_debug || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && 'OFF' || 'ON') }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  config:
    runs-on: ubuntu-latest
    outputs:
      build_type: ${{ steps.set.outputs.build_type }}
      pvz_debug: ${{ steps.set.outputs.pvz_debug }}
      is_release: ${{ steps.set.outputs.is_release }}
    steps:
      - id: set
        run: |
          BT="${{ env.BUILD_TYPE }}"
          PD="${{ env.PVZ_DEBUG }}"
          IR="${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && 'true' || 'false' }}"
          echo "build_type=$BT" >> $GITHUB_OUTPUT
          echo "pvz_debug=$PD" >> $GITHUB_OUTPUT
          echo "is_release=$IR" >> $GITHUB_OUTPUT
          echo "🔧 Build: $BT, PVZ_DEBUG: $PD, Release: $IR"

  auto-tag:
    needs: config
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - id: tag
        run: |
          LAST=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -z "$LAST" ]; then NEXT="v1.0.0"
          else IFS='.' read -r MAJ MIN PAT <<<"${LAST#v}"; PAT=$((PAT + 1)); NEXT="v$MAJ.$MIN.$PAT"; fi
          echo "tag=$NEXT" >> $GITHUB_OUTPUT
          git tag $NEXT && git push origin $NEXT

  build:
    needs: config
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container || null }}
    env:
      BUILD_TYPE: ${{ needs.config.outputs.build_type }}
      PVZ_DEBUG: ${{ needs.config.outputs.pvz_debug }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: 🐧 Arch Linux
            os: ubuntu-latest
            container: archlinux:latest
            cache: |
              build
              /var/cache/pacman/pkg
            setup: |
              pacman -Syu --noconfirm
              pacman -S --noconfirm --needed base-devel cmake libjpeg-turbo libogg libopenmpt libpng libvorbis mpg123 ninja sdl2-compat sudo
              useradd -m builder && echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder
              chown -R builder:builder .
            build: |
              sudo -u builder bash -c '
                mkdir -p build &&
                cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DPVZ_DEBUG=${{ env.PVZ_DEBUG }} &&
                cmake --build build --parallel &&
                mkdir -p dist && cp build/pvz-portable dist/ &&
                [ "${{ env.BUILD_TYPE }}" = "Release" ] && strip dist/pvz-portable || true
              '
            artifact: pvz-portable-archlinux

          - name: 🏁 Windows MSYS2
            os: windows-latest
            setup: |
              # Done by msys2 action
            build: |
              mkdir -p build &&
              cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DCONSOLE=OFF -DBUILD_STATIC=ON -DPVZ_DEBUG=${{ env.PVZ_DEBUG }} &&
              cmake --build build --parallel &&
              mkdir -p dist && cp build/pvz-portable.exe dist/ &&
              [ "${{ env.BUILD_TYPE }}" = "Release" ] && strip dist/pvz-portable.exe || true
            artifact: pvz-portable-windows-msys2
            msys: true

          - name: 🏁 Windows MSVC
            os: windows-latest
            setup: choco install ninja -y --no-progress
            build: |
              cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DCONSOLE=OFF -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x64-windows-static -DPVZ_DEBUG=${{ env.PVZ_DEBUG }} &&
              cmake --build build --parallel &&
              mkdir -p dist && cp build/pvz-portable.exe dist/
            artifact: pvz-portable-windows-msvc
            vcpkg: true

          - name: 🎮 Switch
            os: ubuntu-latest
            container: devkitpro/devkita64:latest
            setup: |
              source $DEVKITPRO/switchvars.sh
              [ ! -d "openmpt" ] && git clone --depth=1 https://github.com/OpenMPT/openmpt && cd openmpt && make CONFIG=gcc SHARED_LIB=0 EXAMPLES=0 OPENMPT123=0 TEST=0 PREFIX=$PORTLIBS_PREFIX install -j$(nproc) && cd ..
            build: |
              source $DEVKITPRO/switchvars.sh
              mkdir -p build && cd build
              aarch64-none-elf-cmake .. -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DPVZ_DEBUG=${{ env.PVZ_DEBUG }}
              make -j$(nproc)
              [ "${{ env.BUILD_TYPE }}" = "Release" ] && aarch64-none-elf-strip pvz-portable.elf || true
            artifact: pvz-portable-switch
            files: |
              build/pvz-portable.nro
              build/pvz-portable.elf

          - name: 🍎 macOS
            os: macos-latest
            setup: |
              brew update
              brew install --quiet cmake dylibbundler jpeg-turbo libogg libopenmpt libpng libvorbis mpg123 ninja sdl2
            build: |
              mkdir -p build dist dist/libs
              cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DPVZ_DEBUG=${{ env.PVZ_DEBUG }}
              cmake --build build --parallel
              cp build/pvz-portable dist/
              [ "${{ env.BUILD_TYPE }}" = "Release" ] && strip -x dist/pvz-portable || true
              dylibbundler -of -b -x dist/pvz-portable -d dist/libs -p @executable_path/libs/
              codesign --force --deep -s - dist/pvz-portable
            artifact: pvz-portable-macos

          - name: 📱 Android
            os: ubuntu-latest
            setup: |
              # JDK, SDK, NDK via actions
            build: |
              # Complex - keeping original
            artifact: pvz-portable-android
            android: true

          - name: 📱 iOS
            os: macos-latest
            setup: |
              # vcpkg via action
            build: |
              mkdir -p build-ios
              cmake -B build-ios -G Xcode -DCMAKE_SYSTEM_NAME=iOS -DCMAKE_OSX_DEPLOYMENT_TARGET=15.0 -DCMAKE_OSX_ARCHITECTURES=arm64 -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DPVZ_DEBUG=${{ env.PVZ_DEBUG }} -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=arm64-ios
              cmake --build build-ios --config ${{ env.BUILD_TYPE }} --parallel -- -sdk iphoneos CODE_SIGN_IDENTITY="-" CODE_SIGNING_ALLOWED=NO
              APP=$(find build-ios -name "*.app" | head -1)
              mkdir -p dist/Payload && cp -R "$APP" dist/Payload/
              cd dist && zip -r pvz-portable-ios.ipa Payload/
            artifact: pvz-portable-ios
            ios: true

          - name: 🌐 WebAssembly
            os: ubuntu-latest
            setup: |
              sudo apt-get update && sudo apt-get install -y ninja-build
            build: |
              mkdir -p build-wasm
              emcmake cmake -G Ninja -B build-wasm -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DLIMBO_PAGE=OFF -DPVZ_DEBUG=${{ env.PVZ_DEBUG }}
              cmake --build build-wasm --parallel
            artifact: pvz-portable-wasm
            wasm: true
            files: |
              build-wasm/pvz-portable.html
              build-wasm/pvz-portable.js
              build-wasm/pvz-portable.wasm

    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Cache
        if: matrix.cache
        uses: actions/cache@v4
        with:
          path: ${{ matrix.cache }}
          key: ${{ matrix.name }}-${{ env.BUILD_TYPE }}-${{ env.PVZ_DEBUG }}-${{ hashFiles('**/CMakeLists.txt') }}

      - name: Setup MSYS2
        if: matrix.msys
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: base-devel mingw-w64-ucrt-x86_64-{cmake,gcc,libjpeg-turbo,libopenmpt,libogg,libpng,libvorbis,mpg123,ninja,SDL2}

      - name: Setup vcpkg
        if: matrix.vcpkg || matrix.android || matrix.ios
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: vcpkg.json

      - name: Setup MSVC
        if: matrix.name == '🏁 Windows MSVC'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Emscripten
        if: matrix.wasm
        uses: mymindstorm/setup-emsdk@v14

      - name: Setup Android
        if: matrix.android
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - if: matrix.android
        uses: android-actions/setup-android@v3

      - name: Setup
        run: ${{ matrix.setup }}

      - name: Build
        run: ${{ matrix.build }}
        shell: ${{ matrix.msys && 'msys2 {0}' || (matrix.name == '🏁 Windows MSVC' && 'pwsh' || 'bash') }}

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-${{ env.BUILD_TYPE }}
          path: ${{ matrix.files || 'dist/' }}
          if-no-files-found: error

  release:
    needs: [config, auto-tag, build]
    if: needs.config.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/download-artifact@v4
        with: { path: artifacts }

      - name: Prepare
        run: |
          mkdir release
          find artifacts -type f -exec cp {} release/ \;
          cd release && ls -la

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.auto-tag.outputs.tag }}
          files: release/*
          generate_release_notes: true