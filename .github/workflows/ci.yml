name: CI build

on:
  push:
    branches: [ "main" ]
    tags: [ "*" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  auto-tag:
    name: Generate Auto Tag
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - id: tag
        name: Determine next tag
        run: |
          LAST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)

          if [ -z "$LAST_TAG" ]; then
            NEXT_TAG="v1.0.0"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<<"${LAST_TAG#v}"
            PATCH=$((PATCH + 1))
            NEXT_TAG="v$MAJOR.$MINOR.$PATCH"
          fi

          echo "tag=$NEXT_TAG" >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          git tag -f ${{ steps.tag.outputs.tag }}
          git push origin ${{ steps.tag.outputs.tag }} --force

  build-archlinux:
    name: Build for Arch Linux (x86_64)
    runs-on: ubuntu-latest
    container: archlinux:latest
    env:
      PVZ_DEBUG: ${{ vars.PVZ_DEBUG || 'ON' }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Cache Build
      uses: actions/cache@v4
      with:
        path: build
        key: ${{ runner.os }}-arch-build-${{ github.ref_name }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-arch-build-${{ github.ref_name }}-
          ${{ runner.os }}-arch-build-
 
    - name: ccache
      uses: actions/cache@v4
      with:
        path: .ccache
        key: ${{ runner.os }}-arch-ccache-${{ github.ref_name }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-arch-ccache-${{ github.ref_name }}-
          ${{ runner.os }}-arch-ccache-

    - name: Install Base Dependencies
      run: |
        pacman -Syu --noconfirm
        pacman -S --noconfirm \
          base-devel \
          cmake \
          libjpeg-turbo \
          libogg \
          libopenmpt \
          libpng \
          libvorbis \
          mpg123 \
          ninja \
          sdl2-compat \
          sudo \
          ccache

    - name: Create Builder User
      run: |
        useradd -m builder
        echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder
        chmod 0440 /etc/sudoers.d/builder

    - name: Fix Directory Permissions
      run: |
        chown -R builder:builder .

    - name: Build PvZ-Portable
      run: |
        # Export GITHUB_WORKSPACE explicitly so the builder user can access it
        export GITHUB_WORKSPACE=$GITHUB_WORKSPACE
        sudo -E -u builder bash -lc '
          set -e
          export CCACHE_DIR="$GITHUB_WORKSPACE/.ccache"
          mkdir -p build
          cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Release -DPVZ_DEBUG=${{ env.PVZ_DEBUG }} -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build build
          
          mkdir -p dist
          cp build/pvz-portable dist/
          if [ "${{ env.PVZ_DEBUG }}" = "OFF" ]; then
            strip dist/pvz-portable
          fi
        '

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pvz-portable-archlinux
        path: dist/

  build-windows-msys2-ucrt64:
    name: Build for Windows (MSYS2 UCRT64)
    runs-on: windows-latest
    env:
      PVZ_DEBUG: ${{ vars.PVZ_DEBUG || 'ON' }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Cache Build
      uses: actions/cache@v4
      with:
        path: build
        key: ${{ runner.os }}-msys2-build-${{ github.ref_name }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-msys2-build-${{ github.ref_name }}-
          ${{ runner.os }}-msys2-build-
 
    - name: ccache
      uses: actions/cache@v4
      with:
        path: .ccache
        key: ${{ runner.os }}-msys2-ccache-${{ github.ref_name }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-msys2-ccache-${{ github.ref_name }}-
          ${{ runner.os }}-msys2-ccache-

    - uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: >-
          base-devel
          mingw-w64-ucrt-x86_64-cmake
          mingw-w64-ucrt-x86_64-gcc
          mingw-w64-ucrt-x86_64-libjpeg-turbo
          mingw-w64-ucrt-x86_64-libopenmpt
          mingw-w64-ucrt-x86_64-libogg
          mingw-w64-ucrt-x86_64-libpng
          mingw-w64-ucrt-x86_64-libvorbis
          mingw-w64-ucrt-x86_64-mpg123
          mingw-w64-ucrt-x86_64-ninja
          mingw-w64-ucrt-x86_64-SDL2
          mingw-w64-ucrt-x86_64-ccache

    - name: Compile PvZ-Portable for Windows
      shell: msys2 {0}
      run: |
        export CCACHE_DIR=$(cygpath -u "$GITHUB_WORKSPACE")/.ccache
        mkdir -p build
        cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Release -DCONSOLE=OFF -DBUILD_STATIC=ON -DCMAKE_COLOR_DIAGNOSTICS=ON -DPVZ_DEBUG=${{ env.PVZ_DEBUG }} -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
        cmake --build build
        
        mkdir -p dist
        cp build/pvz-portable.exe dist/
        if [ "${{ env.PVZ_DEBUG }}" = "OFF" ]; then
          strip dist/pvz-portable.exe
        fi

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pvz-portable-windows-msys2-ucrt64
        path: dist/

  build-windows-msvc-x64:
    name: Build for Windows (MSVC x64)
    runs-on: windows-latest
    env:
      PVZ_DEBUG: ${{ vars.PVZ_DEBUG || 'ON' }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: ccache
      uses: actions/cache@v4
      with:
        path: .ccache
        key: ${{ runner.os }}-msvc-ccache-${{ github.ref_name }}-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          ${{ runner.os }}-msvc-ccache-${{ github.ref_name }}-
          ${{ runner.os }}-msvc-ccache-

    - name: Cache Build
      uses: actions/cache@v4
      with:
        path: build
        key: ${{ runner.os }}-msvc-build-${{ github.ref_name }}-${{ hashFiles('vcpkg.json', 'CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-msvc-build-${{ github.ref_name }}-
          ${{ runner.os }}-msvc-build-

    - uses: ilammy/msvc-dev-cmd@v1

    - name: Install Tools
      run: choco install ninja ccache -y

    - name: Setup vcpkg (manifest mode)
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgJsonGlob: vcpkg.json

    - name: Compile PvZ-Portable for Windows (MSVC)
      shell: pwsh
      run: |
        $env:CCACHE_DIR = "$(Get-Location)/.ccache"
        cmake -G "Ninja" -B build -DCMAKE_BUILD_TYPE=Release -DCONSOLE=OFF -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x64-windows-static -DPVZ_DEBUG=${{ env.PVZ_DEBUG }} -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
        cmake --build build

        New-Item -ItemType Directory -Force -Path dist | Out-Null
        Copy-Item build/pvz-portable.exe dist/

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pvz-portable-windows-msvc-x64
        path: dist/

  build-switch:
    name: Build for Switch
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64:latest
    env:
      PVZ_DEBUG: ${{ vars.PVZ_DEBUG || 'ON' }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Build
        uses: actions/cache@v4
        with:
          path: build
          key: ${{ runner.os }}-switch-build-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-switch-build-${{ github.ref_name }}-
            ${{ runner.os }}-switch-build-
 
      - name: Cache libopenmpt (Switch)
        id: cache-switch-libopenmpt
        uses: actions/cache@v4
        with:
          path: |
            /opt/devkitpro/portlibs/switch/include/libopenmpt
            /opt/devkitpro/portlibs/switch/lib/libopenmpt.a
          key: ${{ runner.os }}-switch-libopenmpt-v1
          restore-keys: |
            ${{ runner.os }}-switch-libopenmpt-
      - name: ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-switch-ccache-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-switch-ccache-${{ github.ref_name }}-
            ${{ runner.os }}-switch-ccache-

      - name: Install dependencies
        run: |
          (apt-get update && apt-get install -y ccache) || (pacman -Syu --noconfirm ccache) || true
          dkp-pacman -S --needed --noconfirm \
            switch-sdl2 \
            switch-libogg \
            switch-libvorbis \
            switch-mpg123 \
            switch-libpng \
            switch-libjpeg-turbo \
            switch-zlib \
            switch-cmake

      - name: Compile libopenmpt for Switch
        if: steps.cache-switch-libopenmpt.outputs.cache-hit != 'true'
        shell: bash
        run: |
          if [ -f "/opt/devkitpro/portlibs/switch/lib/libopenmpt.a" ]; then
            echo "libopenmpt is already cached, skipping."
          else
            source $DEVKITPRO/switchvars.sh
            git clone --depth 1 https://github.com/OpenMPT/openmpt
            cd openmpt
            export CCACHE_DIR=$GITHUB_WORKSPACE/.ccache
            make CONFIG=gcc SHARED_LIB=0 DYNLINK=0 EXAMPLES=0 OPENMPT123=0 TEST=0 PREFIX=$PORTLIBS_PREFIX CC="ccache aarch64-none-elf-gcc" CXX="ccache aarch64-none-elf-g++" install 
          fi

      - name: Build PvZ-Portable for Switch
        shell: bash
        run: |
          source $DEVKITPRO/switchvars.sh
          export CCACHE_DIR=$GITHUB_WORKSPACE/.ccache
          mkdir -p build
          cmake -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_TOOLCHAIN_FILE=$DEVKITPRO/cmake/Switch.cmake -DPVZ_DEBUG=${{ env.PVZ_DEBUG }} -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pvz-portable-switch
          path: |
            build/pvz-portable.nro
            build/pvz-portable.elf

  build-macos:
    name: Build for macOS (aarch64)
    runs-on: macos-latest
    env:
      PVZ_DEBUG: ${{ vars.PVZ_DEBUG || 'ON' }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Cache Build
      uses: actions/cache@v4
      with:
        path: build
        key: ${{ runner.os }}-macos-build-${{ github.ref_name }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-macos-build-${{ github.ref_name }}-
          ${{ runner.os }}-macos-build-
 
    - name: ccache
      uses: actions/cache@v4
      with:
        path: .ccache
        key: ${{ runner.os }}-macos-ccache-${{ github.ref_name }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-macos-ccache-${{ github.ref_name }}-
          ${{ runner.os }}-macos-ccache-

    - name: Install Dependencies
      run: |
        brew update
        brew install cmake \
          dylibbundler \
          jpeg-turbo \
          libogg \
          libopenmpt \
          libpng \
          libvorbis \
          mpg123 \
          ninja \
          sdl2 \
          ccache

    - name: Build PvZ-Portable
      run: |
        export CCACHE_DIR=$GITHUB_WORKSPACE/.ccache
        mkdir -p build
        cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Release -DPVZ_DEBUG=${{ env.PVZ_DEBUG }} -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
        cmake --build build

        mkdir -p dist
        mkdir -p dist/libs
        cp build/pvz-portable dist/
        if [ "${{ env.PVZ_DEBUG }}" = "OFF" ]; then
          strip -x dist/pvz-portable
        fi

        echo "Bundling dependencies..."
        dylibbundler -of -b -x dist/pvz-portable -d dist/libs -p @executable_path/libs/

        codesign --force --deep -s - dist/pvz-portable

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pvz-portable-macos
        path: dist/

  build-android:
    name: Build for Android (arm64-v8a)
    runs-on: ubuntu-latest
    env:
      PVZ_DEBUG: ${{ vars.PVZ_DEBUG || 'ON' }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Cache Build
      id: cache-android
      uses: actions/cache@v4
      with:
        path: |
          build-android-*
          build-sdl2
          sdl2-android
          sdl2-src
        key: ${{ runner.os }}-android-build-${{ github.ref_name }}-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          ${{ runner.os }}-android-build-${{ github.ref_name }}-
          ${{ runner.os }}-android-build-
 
    - name: ccache
      uses: actions/cache@v4
      with:
        path: .ccache
        key: ${{ runner.os }}-android-ccache-${{ github.ref_name }}-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          ${{ runner.os }}-android-ccache-${{ github.ref_name }}-
          ${{ runner.os }}-android-ccache-

    - name: Install Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y ccache

    - name: Set up JDK
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android NDK
      run: |
        # Use the latest NDK available on the runner
        if [ -n "$ANDROID_NDK_LATEST_HOME" ] && [ -d "$ANDROID_NDK_LATEST_HOME" ]; then
          echo "ANDROID_NDK=$ANDROID_NDK_LATEST_HOME" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> "$GITHUB_ENV"
          echo "Using pre-installed NDK: $ANDROID_NDK_LATEST_HOME"
        else
          # Fallback: install via sdkmanager
          yes | sdkmanager --install "ndk;$(sdkmanager --list 2>/dev/null | grep -oP 'ndk;\K[\d.]+' | sort -V | tail -1)" || true
          NDK_DIR=$(ls -d "$ANDROID_HOME"/ndk/*/ 2>/dev/null | sort -V | tail -1)
          echo "ANDROID_NDK=${NDK_DIR%/}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=${NDK_DIR%/}" >> "$GITHUB_ENV"
        fi

    - name: Download SDL2 Source
      run: |
        SDL2_TAG=$(git ls-remote --tags https://github.com/libsdl-org/SDL.git 'refs/tags/release-2.*' \
          | sed 's|.*refs/tags/release-||' | sort -V | tail -1)
        if [ -z "$SDL2_TAG" ]; then
          SDL2_TAG="2.32.10" # Fallback to a known stable version if tag retrieval fails
        fi
        echo "Using SDL2 version: $SDL2_TAG"
        wget -q "https://github.com/libsdl-org/SDL/releases/download/release-${SDL2_TAG}/SDL2-${SDL2_TAG}.tar.gz"
        tar xf "SDL2-${SDL2_TAG}.tar.gz"
        mv "SDL2-${SDL2_TAG}" sdl2-src

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgJsonGlob: vcpkg.json

    - name: Build SDL2 Shared Library
      if: steps.cache-android.outputs.cache-hit != 'true'
      run: |
        # On Android, SDL2 MUST be a shared library because the Java-side
        # SDLActivity loads it via System.loadLibrary("SDL2").
        export CCACHE_DIR=$GITHUB_WORKSPACE/.ccache
        cmake -B build-sdl2 \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-28 \
          -DSDL_SHARED=ON \
          -DSDL_STATIC=OFF \
          -DCMAKE_INSTALL_PREFIX=$GITHUB_WORKSPACE/sdl2-android \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
          sdl2-src
        cmake --build build-sdl2 -j$(nproc)
        cmake --install build-sdl2

    - name: Build Native Library with CMake
      run: |
        ABI=arm64-v8a
        ANDROID_API=28
        BUILD_DIR=build-android-$ABI
        SDL2_PREFIX=$GITHUB_WORKSPACE/sdl2-android

        export CCACHE_DIR=$GITHUB_WORKSPACE/.ccache
        cmake -B $BUILD_DIR \
          -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake \
          -DVCPKG_TARGET_TRIPLET=arm64-android \
          -DVCPKG_CMAKE_SYSTEM_VERSION=$ANDROID_API \
          -DVCPKG_CHAINLOAD_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=$ABI \
          -DANDROID_PLATFORM=android-$ANDROID_API \
          -DSDL2_DIR=$SDL2_PREFIX/lib/cmake/SDL2 \
          -DCMAKE_BUILD_TYPE=Release \
          -DPVZ_DEBUG=${{ env.PVZ_DEBUG }} \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

        cmake --build $BUILD_DIR -j$(nproc)

        # Collect all shared libraries into jniLibs for Gradle to package
        JNILIBS=android/app/src/main/jniLibs/$ABI
        mkdir -p $JNILIBS
        cp -L $BUILD_DIR/libmain.so $JNILIBS/

        # Copy SDL2 shared library
        cp -L $SDL2_PREFIX/lib/libSDL2*.so $JNILIBS/

        # Copy any .so dependencies from vcpkg (manifest mode installs into build dir)
        VCPKG_LIB=$BUILD_DIR/vcpkg_installed/arm64-android/lib
        for so in "$VCPKG_LIB"/*.so; do
          [ -f "$so" ] && cp -L "$so" $JNILIBS/
        done

        if [ "${{ env.PVZ_DEBUG }}" = "OFF" ]; then
          STRIP=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip
          for so in "$JNILIBS"/*.so; do
            "$STRIP" --strip-unneeded "$so"
          done
        fi

        echo "Collected .so files:"
        ls -lh $JNILIBS/

    - name: Build APK with Gradle
      run: |
        cd android
        echo "sdk.dir=$ANDROID_HOME" > local.properties

        # Use gradle wrapper; package pre-built native libraries into a release APK (debug-signed)
        gradle wrapper
        ./gradlew assembleRelease -PusePrebuiltLibs=true --no-daemon

    - name: Copy APK
      run: |
        mkdir -p dist
        find android -name "*.apk" -path "*/release/*" -exec cp {} dist/pvz-portable-android-arm64-v8a.apk \;

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pvz-portable-android
        path: dist/

  build-ios:
    name: Build for iOS (arm64)
    runs-on: macos-latest
    env:
      IOS_DEPLOY_TARGET: "15.0"
      PVZ_DEBUG: ${{ vars.PVZ_DEBUG || 'ON' }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Cache Build
      uses: actions/cache@v4
      with:
        path: build-ios
        key: ${{ runner.os }}-ios-build-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-ios-build-

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgJsonGlob: vcpkg.json

    - name: Build PvZ-Portable for iOS
      run: |
        BUILD_DIR=build-ios

        cmake -B $BUILD_DIR \
          -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake \
          -DVCPKG_TARGET_TRIPLET=arm64-ios \
          -DVCPKG_OVERLAY_PORTS=$GITHUB_WORKSPACE/ios/ports \
          -DCMAKE_SYSTEM_NAME=iOS \
          -DCMAKE_OSX_DEPLOYMENT_TARGET=$IOS_DEPLOY_TARGET \
          -DCMAKE_OSX_ARCHITECTURES=arm64 \
          -DCMAKE_BUILD_TYPE=Release \
          -DPVZ_DEBUG=${{ env.PVZ_DEBUG }} \
          -G Xcode

        cmake --build $BUILD_DIR --config Release -- \
          -sdk iphoneos \
          CODE_SIGN_IDENTITY="-" \
          CODE_SIGNING_ALLOWED=NO

    - name: Create unsigned IPA
      run: |
        APP_PATH=$(find build-ios -name "pvz-portable.app" -path "*Release*" | head -1)
        mkdir -p dist/Payload
        cp -R "$APP_PATH" dist/Payload/
        cd dist
        zip -r -y pvz-portable-ios-arm64.ipa Payload/
        rm -rf Payload

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pvz-portable-ios
        path: dist/

  build-wasm:
    name: Build for WebAssembly (Emscripten)
    runs-on: ubuntu-latest
    env:
      PVZ_DEBUG: ${{ vars.PVZ_DEBUG || 'ON' }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: ccache
      uses: actions/cache@v4
      with:
        path: .ccache
        key: ${{ runner.os }}-wasm-ccache-${{ github.ref_name }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-wasm-ccache-${{ github.ref_name }}-
          ${{ runner.os }}-wasm-ccache-
 
    - name: Cache wasm-libs
      id: cache-wasm-libs
      uses: actions/cache@v4
      with:
        path: wasm-libs
        key: ${{ runner.os }}-wasm-libs-${{ github.ref_name }}-${{ hashFiles('build-wasm/libopenmpt-version.txt') || 'v1' }}
        restore-keys: |
          ${{ runner.os }}-wasm-libs-${{ github.ref_name }}-
          ${{ runner.os }}-wasm-libs-

    - name: Setup Emscripten
      uses: mymindstorm/setup-emsdk@v14

    - name: Install Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build ccache

    - name: Build libopenmpt for Emscripten
      if: steps.cache-wasm-libs.outputs.cache-hit != 'true'
      run: |
        SYSROOT="$(em-config EMSCRIPTEN_ROOT)/cache/sysroot"
        OPENMPT_TAG=$(git ls-remote --tags https://github.com/OpenMPT/openmpt.git 'refs/tags/libopenmpt-*' \
          | grep -v '\^{}' | sed 's|.*refs/tags/libopenmpt-||' \
          | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
        if [ -z "$OPENMPT_TAG" ]; then
          OPENMPT_TAG="0.8.4" # Fallback to a known stable version if tag retrieval fails
        fi
        echo "Using libopenmpt version: $OPENMPT_TAG"
        git clone --depth=1 --branch "libopenmpt-${OPENMPT_TAG}" https://github.com/OpenMPT/openmpt.git /tmp/libopenmpt-src
        cd /tmp/libopenmpt-src
        export CCACHE_DIR=$GITHUB_WORKSPACE/.ccache
        emmake make CONFIG=emscripten \
          STATIC_LIB=1 SHARED_LIB=0 \
          EXAMPLES=0 OPENMPT123=0 TEST=0 \
          NO_ZLIB=1 NO_MPG123=1 NO_OGG=1 NO_VORBIS=1 NO_VORBISFILE=1 \
          NO_PORTAUDIO=1 NO_PORTAUDIOCPP=1 NO_PULSEAUDIO=1 \
          NO_SDL2=1 NO_FLAC=1 NO_SNDFILE=1 \
          CC="ccache emcc" CXX="ccache em++" \
          -j$(nproc)
        emmake make CONFIG=emscripten \
          STATIC_LIB=1 SHARED_LIB=0 \
          EXAMPLES=0 OPENMPT123=0 TEST=0 \
          PREFIX="$GITHUB_WORKSPACE/wasm-libs" \
          CC="ccache emcc" CXX="ccache em++" \
          install

    - name: Build PvZ-Portable for WebAssembly
      run: |
        export CCACHE_DIR=$GITHUB_WORKSPACE/.ccache
        mkdir -p build-wasm
        emcmake cmake -G Ninja -B build-wasm \
          -DCMAKE_BUILD_TYPE=Release \
          -DLIMBO_PAGE=OFF \
          -DPVZ_DEBUG=${{ env.PVZ_DEBUG }} \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
          -DOPENMPT_LIBRARY=$GITHUB_WORKSPACE/wasm-libs/lib/libopenmpt.a \
          -DOPENMPT_INCLUDE_DIR=$GITHUB_WORKSPACE/wasm-libs/include
        cmake --build build-wasm -j$(nproc)

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pvz-portable-wasm
        path: |
          build-wasm/pvz-portable.html
          build-wasm/pvz-portable.js
          build-wasm/pvz-portable.wasm

  release:
    name: Release
    needs: ['auto-tag', 'build-archlinux', 'build-windows-msys2-ucrt64', 'build-windows-msvc-x64', 'build-switch', 'build-macos', 'build-android', 'build-ios', 'build-wasm']
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Release Files
        run: |
          mkdir -p release_files
          
          echo "Inspecting downloaded artifacts..."
          ls -R artifacts/

          echo "Preparing Arch Linux file..."
          chmod +x artifacts/pvz-portable-archlinux/pvz-portable
          mv artifacts/pvz-portable-archlinux/pvz-portable release_files/pvz-portable-archlinux-x86_64

          echo "Preparing Windows MSVC file..."
          mv artifacts/pvz-portable-windows-msvc-x64/pvz-portable.exe release_files/pvz-portable-windows-msvc-x64-static.exe

          echo "Preparing Windows MSYS2 file..."
          mv artifacts/pvz-portable-windows-msys2-ucrt64/pvz-portable.exe release_files/pvz-portable-windows-ucrt64-static.exe

          echo "Preparing macOS file..."
          cd artifacts/pvz-portable-macos
          chmod +x pvz-portable
          zip -r -y ../../release_files/pvz-portable-macos-aarch64.zip .
          cd ../..

          echo "Preparing Android file..."
          mv artifacts/pvz-portable-android/pvz-portable-android-arm64-v8a.apk release_files/pvz-portable-android-arm64-v8a.apk

          echo "Preparing iOS file..."
          mv artifacts/pvz-portable-ios/pvz-portable-ios-arm64.ipa release_files/pvz-portable-ios-arm64.ipa

          echo "Preparing WebAssembly file..."
          cd artifacts/pvz-portable-wasm
          zip -r ../../release_files/pvz-portable-wasm.zip .
          cd ../..

          echo "Preparing Switch files..."
          mv artifacts/pvz-portable-switch/pvz-portable.nro release_files/pvz-portable.nro
          mv artifacts/pvz-portable-switch/pvz-portable.elf release_files/pvz-portable.elf

          echo "Final files:"
          ls -lh release_files/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.auto-tag.outputs.tag }}
          files: release_files/*
          generate_release_notes: true
          draft: false
          prerelease: false