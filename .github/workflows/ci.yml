name: CI build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  auto-tag:
    name: Generate Auto Tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine next tag
        id: next_tag
        run: |
          LAST_TAG=$(git tag --sort=-v:refname | head -n1)
          if [ -z "$LAST_TAG" ]; then
            NEXT_TAG="v1.0.0"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<<"${LAST_TAG#v}"
            PATCH=$((PATCH + 1))
            NEXT_TAG="v$MAJOR.$MINOR.$PATCH"
          fi
          echo "Next tag: $NEXT_TAG"
          echo "NEXT_TAG=$NEXT_TAG" >> $GITHUB_ENV

      - name: Create and Push Tag
        run: |
          git tag $NEXT_TAG
          git push origin $NEXT_TAG

  build-archlinux:
    name: Build for Arch Linux (x86_64)
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install Base Dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            base-devel \
            cmake \
            libjpeg-turbo \
            libogg \
            libopenmpt \
            libpng \
            libvorbis \
            mpg123 \
            ninja \
            sdl2-compat \
            sudo
      - name: Create Builder User
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder
          chmod 0440 /etc/sudoers.d/builder
      - name: Fix Directory Permissions
        run: |
          chown -R builder:builder .
      - name: Build PvZ-Portable
        run: |
          sudo -u builder bash -lc '
            mkdir build
            cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Release
            cmake --build build

            mkdir -p dist
            cp build/pvz-portable dist/
            strip dist/pvz-portable
          '
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: pvz-portable-archlinux
          path: dist/

  build-windows-msys2-ucrt64:
    name: Build for Windows (MSYS2 UCRT64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            base-devel
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-libjpeg-turbo
            mingw-w64-ucrt-x86_64-libopenmpt
            mingw-w64-ucrt-x86_64-libogg
            mingw-w64-ucrt-x86_64-libpng
            mingw-w64-ucrt-x86_64-libvorbis
            mingw-w64-ucrt-x86_64-mpg123
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-SDL2
      - name: Compile PvZ-Portable for Windows
        shell: msys2 {0}
        run: |
          mkdir build
          cmake -G Ninja -B build -DCMAKE_BUILD_TYPE=Release -DCONSOLE=OFF -DBUILD_STATIC=ON -DCMAKE_COLOR_DIAGNOSTICS=ON
          cmake --build build
          
          mkdir -p dist
          cp build/pvz-portable.exe dist/
          strip dist/pvz-portable.exe
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: pvz-portable-windows-msys2-ucrt64
          path: dist/

  build-windows-msvc-x64:
    name: Build for Windows (MSVC x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ilammy/msvc-dev-cmd@v1
      - name: Install Ninja
        run: choco install ninja -y
      - name: Setup vcpkg (manifest mode)
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: vcpkg.json
      - name: Compile PvZ-Portable for Windows (MSVC)
        shell: pwsh
        run: |
          cmake -G "Ninja" -B build -DCMAKE_BUILD_TYPE=Release -DCONSOLE=OFF -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x64-windows-static
          cmake --build build
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item build/pvz-portable.exe dist/
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: pvz-portable-windows-msvc-x64
          path: dist/

# ... incluye aquí todos tus otros jobs de build: build-switch, build-macos, build-android, build-ios, build-wasm ...
# Los steps son los mismos que pusiste en tu mensaje anterior, no cambian excepto que se mantienen consistentes

  release:
    name: Release
    needs: ['auto-tag','build-archlinux', 'build-windows-msys2-ucrt64', 'build-windows-msvc-x64', 'build-switch', 'build-macos', 'build-android', 'build-ios', 'build-wasm']
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Release Files
        run: |
          mkdir -p release_files

          echo "Preparing Arch Linux file..."
          chmod +x artifacts/pvz-portable-archlinux/pvz-portable
          mv artifacts/pvz-portable-archlinux/pvz-portable release_files/pvz-portable-archlinux-x86_64

          echo "Preparing Windows MSVC file..."
          mv artifacts/pvz-portable-windows-msvc-x64/pvz-portable.exe release_files/pvz-portable-windows-msvc-x64-static.exe

          echo "Preparing Windows MSYS2 file..."
          mv artifacts/pvz-portable-windows-msys2-ucrt64/pvz-portable.exe release_files/pvz-portable-windows-ucrt64-static.exe

          echo "Preparing macOS file..."
          cd artifacts/pvz-portable-macos
          chmod +x pvz-portable
          zip -r -y ../../release_files/pvz-portable-macos-aarch64.zip .
          cd ../..

          echo "Preparing Android file..."
          mv artifacts/pvz-portable-android/pvz-portable-android-arm64-v8a.apk release_files/pvz-portable-android-arm64-v8a.apk

          echo "Preparing iOS file..."
          mv artifacts/pvz-portable-ios/pvz-portable-ios-arm64.ipa release_files/pvz-portable-ios-arm64.ipa

          echo "Preparing WebAssembly file..."
          cd artifacts/pvz-portable-wasm
          zip -r ../../release_files/pvz-portable-wasm.zip .
          cd ../..

          echo "Final files:"
          ls -lh release_files/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.NEXT_TAG }}
          files: release_files/*
          generate_release_notes: true
          draft: false
          prerelease: false